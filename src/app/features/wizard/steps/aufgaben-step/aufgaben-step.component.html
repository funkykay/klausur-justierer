<div class="space-y-6">
  <div class="flex flex-col gap-3 md:flex-row md:items-end md:justify-between">
    <div>
      <h3 class="text-sm font-semibold text-slate-900">Aufgaben der Klausur</h3>
      <p class="mt-1 text-sm text-slate-600">Lege pro Aufgabe einen Namen und die erreichbare Punktzahl fest.</p>
    </div>

    <button class="button-secondary" type="button" (click)="addTask()">Aufgabe hinzufügen</button>
  </div>

  <app-field-error [errors]="showErrors ? errors['tasks'] : undefined" />

  <div class="space-y-3">
    @for (task of data.tasks; track index; let index = $index) {
      <section class="rounded-lg border border-slate-200 bg-white p-4 shadow-sm">
        <div class="grid gap-4 md:grid-cols-[minmax(0,1fr)_12rem_7rem] md:items-start">
          <label>
            <span class="field-label">Aufgabe</span>
            <input
              class="field-input"
              [class.field-input-error]="showErrors && errors['tasks.' + index + '.name']"
              type="text"
              [value]="task.name"
              (input)="updateTask(index, 'name', textValue($event))"
              (blur)="wizard.markCurrentTouched()"
            />
            <app-field-error [errors]="showErrors ? errors['tasks.' + index + '.name'] : undefined" />
          </label>

          <label>
            <span class="field-label">Punkte</span>
            <input
              class="field-input"
              [class.field-input-error]="showErrors && errors['tasks.' + index + '.maxPoints']"
              type="number"
              min="0"
              step="0.5"
              [value]="task.maxPoints ?? ''"
              (input)="updateTask(index, 'maxPoints', numberValue($event))"
              (blur)="wizard.markCurrentTouched()"
            />
            <app-field-error [errors]="showErrors ? errors['tasks.' + index + '.maxPoints'] : undefined" />
          </label>

          <div class="md:pt-6">
            <button
              class="button-secondary w-full"
              type="button"
              [disabled]="data.tasks.length === 1"
              (click)="removeTask(index)"
            >
              Entfernen
            </button>
          </div>
        </div>
      </section>
    }
  </div>

  <div class="rounded-lg border border-slate-200 bg-slate-50 px-4 py-3">
    <div class="flex items-center justify-between gap-4">
      <span class="text-sm font-semibold text-slate-900">Gesamt</span>
      <span class="text-sm font-semibold text-slate-900">{{ totalPoints }}</span>
    </div>
  </div>
</div>
