<div class="space-y-6">
  <div class="flex flex-col gap-3 md:flex-row md:items-end md:justify-between">
    <div>
      <h3 class="text-sm font-semibold text-slate-900 dark:text-slate-100">Teilnehmer und Punkte</h3>
      <p class="mt-1 text-sm text-slate-600 dark:text-slate-400">
        Erfasse pro Zeile eine Person und die erreichten Punkte je Aufgabe.
      </p>
    </div>

    <button class="button-secondary" type="button" (click)="addParticipant()">Teilnehmer hinzufügen</button>
  </div>

  <div class="teilnehmer-hot overflow-hidden rounded-lg border border-slate-200 bg-white shadow-sm dark:border-slate-800 dark:bg-slate-950">
    <div #gridElement></div>
  </div>

  @if (showErrors && validationMessages.length) {
    <div class="rounded-lg border border-red-200 bg-red-50 px-4 py-3 dark:border-red-900 dark:bg-red-950">
      <h3 class="text-sm font-semibold text-red-800 dark:text-red-200">Validierungsfehler</h3>
      <ul class="mt-2 list-disc space-y-1 pl-5 text-sm text-red-700 dark:text-red-200">
        @for (message of validationMessages; track message) {
          <li>{{ message }}</li>
        }
      </ul>
    </div>
  }
</div>
