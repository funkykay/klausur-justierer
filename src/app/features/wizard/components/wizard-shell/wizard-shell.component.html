<div
  class="mx-auto flex min-h-[calc(100vh-2rem)] flex-col gap-3 pb-32 sm:min-h-[calc(100vh-4rem)] sm:gap-5 sm:pb-36 md:pb-28"
  [class.max-w-6xl]="!viewWidth.isWide()"
  [class.max-w-screen-2xl]="viewWidth.isWide()"
>
  <header class="flex items-end justify-between gap-4 px-1 sm:px-0">
    <div>
      <h1 class="text-2xl font-semibold tracking-tight text-slate-950 dark:text-slate-100 sm:text-3xl">{{ state().title }}</h1>
    </div>

    <app-session-actions />
  </header>

  <section class="panel mobile-chain-panel">
    <app-step-chain />
  </section>

  <section class="panel mobile-flat-panel flex-1">
    <div class="mb-4 border-b border-slate-200 pb-3 dark:border-slate-800 sm:mb-6 sm:pb-4">
      <p class="text-xs font-medium uppercase tracking-[0.18em] text-slate-500 dark:text-slate-400">
        Schritt {{ state().currentStepIndex + 1 }} von {{ state().steps.length }}
      </p>
      <h2 class="mt-1 text-xl font-semibold text-slate-950 dark:text-slate-100">{{ currentStep().title }}</h2>
    </div>

    @switch (currentStep().id) {
      @case ('basis') {
        <app-basis-step />
      }
      @case ('aufgaben') {
        <app-aufgaben-step />
      }
      @case ('notenschema') {
        <app-notenschema-step />
      }
      @case ('teilnehmer') {
        <app-teilnehmer-step />
      }
      @case ('justierung') {
        <app-justierung-step />
      }
    }
  </section>

  <app-wizard-navigation />
</div>
