<footer class="fixed inset-x-0 bottom-0 z-20 border-t border-slate-200 bg-white/95 px-2 py-2 shadow-lg backdrop-blur dark:border-slate-800 dark:bg-slate-950/95 sm:px-4 sm:py-3">
  <div
    class="mx-auto flex items-center justify-between gap-3"
    [class.max-w-6xl]="!viewWidth.isWide()"
    [class.max-w-screen-2xl]="viewWidth.isWide()"
  >
    <button class="button-secondary" type="button" [disabled]="isFirst()" (click)="wizard.previous()">
      Zurück
    </button>

    <button class="button-secondary" type="button" [disabled]="isLast()" (click)="wizard.next()">
      Weiter
    </button>
  </div>
</footer>
