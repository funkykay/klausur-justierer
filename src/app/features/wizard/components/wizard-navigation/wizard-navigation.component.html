<footer class="fixed inset-x-0 bottom-0 z-20 border-t border-slate-200 bg-white/95 px-4 py-3 shadow-lg backdrop-blur dark:border-slate-800 dark:bg-slate-950/95">
  <div class="mx-auto flex max-w-6xl items-center justify-between gap-3">
    <button class="button-secondary" type="button" [disabled]="isFirst()" (click)="wizard.previous()">
      Zurück
    </button>

    <button class="button-secondary" type="button" [disabled]="isLast()" (click)="wizard.next()">
      Weiter
    </button>
  </div>
</footer>
