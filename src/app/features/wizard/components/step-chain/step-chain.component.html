<nav class="overflow-hidden" aria-label="Wizard-Schritte">
  <ol class="-mx-1 flex snap-x items-stretch overflow-x-auto px-1 pb-1 md:mx-0 md:grid md:grid-cols-5 md:overflow-visible md:px-0 md:pb-0">
    @for (step of state().steps; track step.id; let index = $index) {
      <li class="relative flex min-w-[5.75rem] flex-1 snap-center justify-center md:min-w-0">
        @if (index > 0) {
          <div class="absolute left-0 right-1/2 top-[1.625rem] h-0.5" [class]="connectorClass(state().steps[index - 1])"></div>
        }

        @if (index < state().steps.length - 1) {
          <div class="absolute left-1/2 right-0 top-[1.625rem] h-0.5" [class]="connectorClass(step)"></div>
        }

        <button
          class="relative z-10 flex w-full flex-col items-center gap-2 rounded-lg px-2 py-1.5 text-center transition focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-slate-950/20 dark:focus-visible:ring-slate-100/20"
          type="button"
          [attr.aria-current]="index === state().currentStepIndex ? 'step' : null"
          (click)="wizard.goTo(index)"
        >
          <span
            class="flex h-10 w-10 shrink-0 items-center justify-center rounded-full border-2 text-sm font-semibold transition"
            [class]="pearlClass(step, index, state().currentStepIndex)"
          >
            @if (isAdjustmentStep(step)) {
              <svg class="h-5 w-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" aria-hidden="true">
                <path stroke-linecap="round" stroke-linejoin="round" d="M4 7h5" />
                <path stroke-linecap="round" stroke-linejoin="round" d="M15 7h5" />
                <circle cx="12" cy="7" r="2.25" />
                <path stroke-linecap="round" stroke-linejoin="round" d="M4 17h9" />
                <path stroke-linecap="round" stroke-linejoin="round" d="M19 17h1" />
                <circle cx="16" cy="17" r="2.25" />
              </svg>
            } @else {
              {{ index + 1 }}
            }
          </span>

          <span class="block max-w-20 text-xs font-medium leading-tight text-slate-900 dark:text-slate-100 md:max-w-none md:text-sm">
            {{ step.title }}
          </span>
        </button>
      </li>
    }
  </ol>
</nav>
